<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>END</title>
    <link rel="stylesheet" href="./main.css">
</head>

<body>

    <div id="start-screen">
        <h1>ĐUNG ĐƯA THEO GIAI ĐIỆU ĐỂ THOÁT KHỎI ĐÂY</h1>
        <p>TIẾN VÀO HỒI KẾT</p>
        <button id="start-button">START</button>
    </div>

    <div id="game-container" style="display:none;">
        <div id="scoreboard">
            <div id="score">Score : 0</div>
            <div id="combo">Combo : 0</div>
            <!-- Đã bỏ dòng #judge ở đây -->
        </div>

        <div id="game">
            <div class="lane" id="lane0"></div>
            <div class="lane" id="lane1"></div>
            <div class="lane" id="lane2"></div>
            <div class="lane" id="lane3"></div>
            <div id="judge-line"></div>

            <!-- ĐƯA CHỮ PHÁN XÉT VÀO GIỮA KHUNG TRÒ CHƠI Ở ĐÂY -->
            <div id="judge">Ready</div>
        </div>

        <div id="keys">
            <div data-lane="0">D</div>
            <div data-lane="1">F</div>
            <div data-lane="2">J</div>
            <div data-lane="3">K</div>
        </div>
    </div>

    <audio id="music" preload="metadata" playsinline webkit-playsinline>
        <source src="./owari.mp3" type="audio/mpeg">
    </audio>
    <script>
        function updateOrientationOverlay() {
            const overlay = document.getElementById('rotate-screen');

        }
        window.addEventListener('resize', updateOrientationOverlay);
        window.addEventListener('orientationchange', updateOrientationOverlay);
        document.addEventListener('DOMContentLoaded', updateOrientationOverlay);
    </script>
    <script src="script.js"></script>
</body>

</html>
